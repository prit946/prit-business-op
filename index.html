<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prit Business Op</title>
<style>
:root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c26;--border:#2a2a3a;--accent:#4f7cff;--accent2:#7c4fff;--success:#22c55e;--warning:#f59e0b;--danger:#ef4444;--text:#f0f0f5;--text2:#8888aa;--text3:#555570;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 32px;width:100%;max-width:380px;}
.auth-logo{text-align:center;margin-bottom:32px;}
.logo-mark{width:56px;height:56px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:16px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;}
.auth-logo h1{font-size:20px;font-weight:700;}
.auth-logo p{color:var(--text2);font-size:13px;margin-top:4px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;letter-spacing:.05em;text-transform:uppercase;}
.field input,.field select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:15px;outline:none;transition:border-color .2s;}
.field input:focus,.field select:focus{border-color:var(--accent);}
select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:15px;outline:none;}
.btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.btn:hover{opacity:.85;}
.auth-error{color:var(--danger);font-size:13px;text-align:center;margin-top:12px;min-height:20px;}
#app{display:none;min-height:100vh;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar-logo{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;}
.nav{background:var(--surface);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;padding:0 12px;gap:2px;}
.nav::-webkit-scrollbar{display:none;}
.nav-item{padding:12px 14px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;}
.nav-item.active{color:var(--accent);border-bottom-color:var(--accent);}
.content{padding:20px;max-width:900px;margin:0 auto;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px;}
.biz-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:500px){.biz-grid{grid-template-columns:1fr;}}
.biz-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;cursor:pointer;transition:border-color .2s,transform .15s;}
.biz-card:hover{border-color:var(--accent);transform:translateY(-1px);}
.biz-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:12px;}
.biz-add{border:2px dashed var(--border);background:transparent;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;min-height:140px;color:var(--text3);}
.biz-add:hover{border-color:var(--accent);color:var(--accent);}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-green{background:#22c55e22;color:var(--success);}
.badge-yellow{background:#f59e0b22;color:var(--warning);}
.badge-gray{background:#ffffff11;color:var(--text2);}
.badge-blue{background:#4f7cff22;color:var(--accent);}
.emp-list{display:flex;flex-direction:column;gap:10px;}
.emp-row{background:var(--surface2);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:background .2s;}
.emp-row:hover{background:var(--border);}
.emp-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;}
.emp-info{flex:1;}
.emp-name{font-size:14px;font-weight:600;}
.emp-role{font-size:12px;color:var(--text2);margin-top:2px;}
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.week-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:13px;}
.schedule-grid{overflow-x:auto;}
.schedule-table{width:100%;border-collapse:collapse;min-width:600px;}
.schedule-table th{background:var(--surface2);padding:10px 8px;font-size:11px;font-weight:600;color:var(--text2);text-align:center;border:1px solid var(--border);}
.schedule-table td{border:1px solid var(--border);padding:6px;text-align:center;vertical-align:middle;min-width:80px;}
.schedule-table td:first-child{text-align:left;padding:8px 12px;font-size:13px;font-weight:600;background:var(--surface2);min-width:100px;}
.shift-cell{background:var(--surface2);border-radius:6px;padding:4px 6px;font-size:11px;cursor:pointer;}
.shift-time{font-weight:600;color:var(--accent);}
.shift-empty{color:var(--text3);font-size:18px;cursor:pointer;}
.shift-empty:hover{color:var(--accent);}
.pay-stat{background:var(--surface2);border-radius:12px;padding:14px;}
.pay-stat-label{font-size:11px;color:var(--text2);margin-bottom:6px;}
.pay-stat-val{font-size:22px;font-weight:800;}
.modal-overlay{position:fixed;inset:0;background:#00000088;z-index:200;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:500px;padding:28px 24px;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:17px;font-weight:700;margin-bottom:20px;}
.modal-actions{display:flex;gap:10px;margin-top:20px;}
.btn-sm{padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;}
.btn-outline{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-danger{background:var(--danger);color:#fff;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:400px){.form-row{grid-template-columns:1fr;}}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.section-title{font-size:18px;font-weight:800;}
.add-btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;}
.add-btn:hover{opacity:.85;}
.edit-btn{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;}
.request-row{background:var(--surface2);border-radius:12px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px;}
.action-btn{padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;border:none;cursor:pointer;}
.approve-btn{background:#22c55e22;color:var(--success);}
.deny-btn{background:#ef444422;color:var(--danger);}
.chat-container{display:flex;flex-direction:column;height:calc(100vh - 160px);}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
.chat-bubble{max-width:75%;}
.chat-bubble.mine{align-self:flex-end;}
.chat-bubble.theirs{align-self:flex-start;}
.bubble-name{font-size:11px;color:var(--text2);margin-bottom:4px;}
.bubble-text{padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.4;}
.mine .bubble-text{background:var(--accent);color:#fff;border-radius:16px 16px 4px 16px;}
.theirs .bubble-text{background:var(--surface2);border-radius:16px 16px 16px 4px;}
.bubble-time{font-size:10px;color:var(--text3);margin-top:4px;text-align:right;}
.chat-input-row{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:10px;background:var(--surface);}
.chat-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:10px 16px;color:var(--text);font-size:14px;outline:none;}
.send-btn{background:var(--accent);color:#fff;border:none;border-radius:50%;width:40px;height:40px;font-size:18px;cursor:pointer;flex-shrink:0;}
.detail-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.back-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:10px;cursor:pointer;font-size:13px;white-space:nowrap;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.info-item label{font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.05em;}
.info-item p{font-size:14px;font-weight:600;margin-top:4px;}
.empty{text-align:center;padding:40px 20px;color:var(--text3);}
.empty-icon{font-size:40px;margin-bottom:12px;}
.loader{text-align:center;padding:40px;color:var(--text2);}
.divider{height:1px;background:var(--border);margin:16px 0;}
.tip-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:12px;}
.tip-card h3{font-size:14px;font-weight:700;margin-bottom:10px;}
.tip-card li{font-size:13px;color:var(--text2);line-height:2;margin-left:16px;}
.c0{background:#4f7cff33;color:#4f7cff}.c1{background:#7c4fff33;color:#7c4fff}.c2{background:#22c55e33;color:#22c55e}.c3{background:#f59e0b33;color:#f59e0b}.c4{background:#ef444433;color:#ef4444}.c5{background:#06b6d433;color:#06b6d4}
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-mark">P</div>
      <h1>Prit Business Op</h1>
      <p>Business Operating System</p>
    </div>
    <div class="field"><label>Email</label><input type="email" id="auth-email" placeholder="you@email.com" autocomplete="email"></div>
    <div class="field"><label>Password</label><input type="password" id="auth-pass" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn btn-primary" onclick="signIn()">Sign In</button>
    <p class="auth-error" id="auth-error"></p>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">P</div>
      <span style="font-weight:700;font-size:16px">Prit Business Op</span>
    </div>
    <button style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:13px;" onclick="signOut()">Sign Out</button>
  </div>
  <div class="nav" id="main-nav">
    <div class="nav-item active" onclick="showTab('dashboard')">Dashboard</div>
    <div class="nav-item" onclick="showTab('businesses')">Businesses</div>
    <div class="nav-item" onclick="showTab('employees')">Employees</div>
    <div class="nav-item" onclick="showTab('schedule')">Schedule</div>
    <div class="nav-item" onclick="showTab('payroll')">Payroll</div>
    <div class="nav-item" onclick="showTab('expenses')">Expenses</div>
    <div class="nav-item" onclick="showTab('timeoff')">Time Off</div>
    <div class="nav-item" onclick="showTab('chat')">Chat</div>
    <div class="nav-item" onclick="showTab('tips')">Tips ❓</div>
  </div>
  <div class="content" id="main-content"><div class="loader">Loading...</div></div>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="modal-biz">
  <div class="modal">
    <div class="modal-title" id="modal-biz-title">Add Business</div>
    <input type="hidden" id="biz-edit-id">
    <div class="field"><label>Business Name</label><input type="text" id="biz-name" placeholder="e.g. The UPS Store #8181"></div>
    <div class="field"><label>Type</label><select id="biz-type"><option value="franchise">Franchise</option><option value="llc">LLC</option><option value="s-corp">S-Corp</option><option value="sole-prop">Sole Proprietorship</option><option value="rental">Rental Property</option><option value="restaurant">Restaurant / Food</option><option value="real-estate">Real Estate</option><option value="other">Other</option></select></div>
    <div class="form-row">
      <div class="field"><label>EIN</label><input type="text" id="biz-ein" placeholder="XX-XXXXXXX"></div>
      <div class="field"><label>State</label><input type="text" id="biz-state" placeholder="TN"></div>
    </div>
    <div class="field"><label>Address</label><input type="text" id="biz-address"></div>
    <div class="field"><label>Franchisor / Parent Company</label><input type="text" id="biz-franchisor" placeholder="If applicable"></div>
    <div class="field"><label>Owner / Operator</label><input type="text" id="biz-owner"></div>
    <div class="field"><label>Notes</label><input type="text" id="biz-notes"></div>
    <div class="modal-actions">
      <button class="btn-sm btn-outline" style="flex:1" onclick="closeModal('modal-biz')">Cancel</button>
      <button class="btn-sm btn-primary btn" style="flex:2;width:auto;padding:10px 20px" onclick="saveBusiness()">Save</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-emp">
  <div class="modal">
    <div class="modal-title">Add Employee</div>
    <div class="field"><label>Business</label><select id="emp-biz"></select></div>
    <div class="form-row">
      <div class="field"><label>First Name</label><input type="text" id="emp-first"></div>
      <div class="field"><label>Last Name</label><input type="text" id="emp-last"></div>
    </div>
    <div class="field"><label>Role / Title</label><input type="text" id="emp-role" placeholder="e.g. Store Associate"></div>
    <div class="form-row">
      <div class="field"><label>Primary Phone</label><input type="tel" id="emp-phone"></div>
      <div class="field"><label>Secondary Phone</label><input type="tel" id="emp-phone2"></div>
    </div>
    <div class="form-row">
      <div class="field"><label>Email</label><input type="email" id="emp-email"></div>
      <div class="field"><label>Hourly Rate ($)</label><input type="number" id="emp-rate" step="0.25"></div>
    </div>
    <div class="form-row">
      <div class="field"><label>Hire Date</label><input type="date" id="emp-hire"></div>
      <div class="field"><label>Status</label><select id="emp-status"><option value="active">Active</option><option value="part-time">Part-Time</option><option value="inactive">Inactive</option></select></div>
    </div>
    <div class="modal-actions">
      <button class="btn-sm btn-outline" style="flex:1" onclick="closeModal('modal-emp')">Cancel</button>
      <button class="btn-sm btn-primary btn" style="flex:2;width:auto;padding:10px 20px" onclick="saveEmployee()">Save</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-shift">
  <div class="modal">
    <div class="modal-title" id="shift-modal-title">Set Shift</div>
    <div class="form-row">
      <div class="field"><label>Start</label><input type="time" id="shift-start" value="09:00"></div>
      <div class="field"><label>End</label><input type="time" id="shift-end" value="17:00"></div>
    </div>
    <div class="field"><label>Notes</label><input type="text" id="shift-notes"></div>
    <div class="modal-actions">
      <button class="btn-sm btn-outline" style="flex:1" onclick="closeModal('modal-shift')">Cancel</button>
      <button class="btn-sm btn-danger" style="flex:1" onclick="clearShift()">Clear</button>
      <button class="btn-sm btn-primary btn" style="flex:2;width:auto;padding:10px 20px" onclick="saveShift()">Save</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-timeoff">
  <div class="modal">
    <div class="modal-title">Time Off Request</div>
    <div class="field"><label>Business</label><select id="to-biz" onchange="updateTOEmps(this.value)"></select></div>
    <div class="field"><label>Employee</label><select id="to-emp"></select></div>
    <div class="form-row">
      <div class="field"><label>From</label><input type="date" id="to-from"></div>
      <div class="field"><label>To</label><input type="date" id="to-to"></div>
    </div>
    <div class="field"><label>Reason</label><input type="text" id="to-reason"></div>
    <p style="font-size:12px;color:var(--warning);margin-top:-8px">⚠️ 2-week advance notice required</p>
    <div class="modal-actions">
      <button class="btn-sm btn-outline" style="flex:1" onclick="closeModal('modal-timeoff')">Cancel</button>
      <button class="btn-sm btn-primary btn" style="flex:2;width:auto;padding:10px 20px" onclick="saveTimeOff()">Submit</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-expense">
  <div class="modal">
    <div class="modal-title">Log Expense</div>
    <div class="field"><label>Business</label><select id="exp-biz"></select></div>
    <div class="field"><label>Category</label><select id="exp-cat"><option value="property-tax">Property Tax</option><option value="management-fee">Property Management Fee</option><option value="insurance">Insurance</option><option value="utilities">Utilities</option><option value="maintenance">Maintenance / Repairs</option><option value="supplies">Supplies</option><option value="payroll">Payroll</option><option value="rent">Rent / Lease</option><option value="franchise-fee">Franchise Fee / Royalty</option><option value="professional">Professional Fees (CPA, Legal)</option><option value="marketing">Marketing</option><option value="equipment">Equipment</option><option value="other">Other</option></select></div>
    <div class="form-row">
      <div class="field"><label>Amount ($)</label><input type="number" id="exp-amount" step="0.01"></div>
      <div class="field"><label>Date</label><input type="date" id="exp-date"></div>
    </div>
    <div class="field"><label>Paid To</label><input type="text" id="exp-payee" placeholder="Vendor or company"></div>
    <div class="field"><label>Description</label><input type="text" id="exp-desc" placeholder="Optional detail"></div>
    <div class="modal-actions">
      <button class="btn-sm btn-outline" style="flex:1" onclick="closeModal('modal-expense')">Cancel</button>
      <button class="btn-sm btn-primary btn" style="flex:2;width:auto;padding:10px 20px" onclick="saveExpense()">Save</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-confirm">
  <div class="modal">
    <div class="modal-title" id="confirm-title">Are you sure?</div>
    <p id="confirm-msg" style="color:var(--text2);font-size:14px;margin-bottom:4px"></p>
    <div class="modal-actions">
      <button class="btn-sm btn-outline" style="flex:1" onclick="closeModal('modal-confirm')">Cancel</button>
      <button class="btn-sm btn-danger" style="flex:1" id="confirm-ok">Delete</button>
    </div>
  </div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,signInWithEmailAndPassword,signOut as fbSignOut,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,collection,doc,addDoc,setDoc,getDoc,getDocs,updateDoc,deleteDoc,onSnapshot,query,orderBy,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig={apiKey:"AIzaSyD1rNduHdthc_J7juITnQIZycrbmRIRLMw",authDomain:"prit-business-op.firebaseapp.com",projectId:"prit-business-op",storageBucket:"prit-business-op.firebasestorage.app",messagingSenderId:"440241703218",appId:"1:440241703218:web:a0283548f8769cfb83af2b"};
const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

let currentUser=null,businesses=[],employees=[],bizFilter='all',weekOffset=0,shiftCtx=null,chatUnsub=null,currentTab='dashboard';
const COLORS=['c0','c1','c2','c3','c4','c5'];
const CAT_LABELS={'property-tax':'Property Tax','management-fee':'Mgmt Fee','insurance':'Insurance','utilities':'Utilities','maintenance':'Maintenance','supplies':'Supplies','payroll':'Payroll','rent':'Rent/Lease','franchise-fee':'Franchise Fee','professional':'Professional Fees','marketing':'Marketing','equipment':'Equipment','other':'Other'};
const BIZ_ICONS={'franchise':'📦','llc':'🏢','rental':'🏠','restaurant':'🍽️','real-estate':'🏗️','s-corp':'💼','sole-prop':'👤','other':'🔷'};
const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

function gc(i){return COLORS[i%COLORS.length];}
function ini(n){return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function fmt12(t){if(!t)return'';let[h,m]=t.split(':');h=parseInt(h);let ap=h>=12?'PM':'AM';h=h%12||12;return`${h}:${m}${ap}`;}
function fmtD(d){if(!d)return'—';return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function getWeekDates(off=0){const n=new Date(),day=n.getDay(),mon=new Date(n);mon.setDate(n.getDate()-day+1+(off*7));return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});}
function confirm2(title,msg,cb){document.getElementById('confirm-title').textContent=title;document.getElementById('confirm-msg').textContent=msg;document.getElementById('confirm-ok').onclick=()=>{closeModal('modal-confirm');cb();};openModal('modal-confirm');}

window.signIn=async function(){
  const e=document.getElementById('auth-email').value,p=document.getElementById('auth-pass').value,err=document.getElementById('auth-error');
  err.textContent='';
  try{await signInWithEmailAndPassword(auth,e,p);}catch(x){err.textContent='Invalid email or password';}
};
window.signOut=async function(){if(chatUnsub)chatUnsub();await fbSignOut(auth);};

onAuthStateChanged(auth,async user=>{
  if(user){
    currentUser=user;
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('app').style.display='block';
    await loadAll();
    showTab('dashboard');
  }else{
    document.getElementById('auth-screen').style.display='flex';
    document.getElementById('app').style.display='none';
  }
});

async function loadAll(){
  const[bs,es]=await Promise.all([getDocs(collection(db,'businesses')),getDocs(collection(db,'employees'))]);
  businesses=bs.docs.map(d=>({id:d.id,...d.data()}));
  employees=es.docs.map(d=>({id:d.id,...d.data()}));
  const ss=await getDocs(collection(db,'shifts'));
  window._shifts={};ss.docs.forEach(d=>{window._shifts[d.id]={...d.data()};});
}

window.showTab=function(tab){
  currentTab=tab;
  if(tab!=='chat'&&chatUnsub){chatUnsub();chatUnsub=null;}
  document.querySelectorAll('.nav-item').forEach((el,i)=>{
    el.classList.toggle('active',['dashboard','businesses','employees','schedule','payroll','expenses','timeoff','chat','tips'][i]===tab);
  });
  render();
  if(tab==='timeoff')setTimeout(loadTimeOff,100);
  if(tab==='expenses')setTimeout(loadExpenses,100);
  if(tab==='chat')startChat();
};

function render(){
  const c=document.getElementById('main-content');
  if(currentTab==='dashboard')c.innerHTML=rDashboard();
  else if(currentTab==='businesses')c.innerHTML=rBusinesses();
  else if(currentTab==='employees')c.innerHTML=rEmployees();
  else if(currentTab==='schedule')c.innerHTML=rSchedule();
  else if(currentTab==='payroll')c.innerHTML=rPayroll();
  else if(currentTab==='expenses')c.innerHTML=rExpenses();
  else if(currentTab==='timeoff')c.innerHTML=rTimeOff();
  else if(currentTab==='chat')c.innerHTML=rChat();
  else if(currentTab==='tips')c.innerHTML=rTips();
}

window.editShift=function(empId,name,date){

  const sh={start:document.getElementById('shift-start').value,end:document.getElementById('shift-end').value,notes:document.getElementById('shift-notes').value};

      </tr>`).join('')}</tbody>

  </div>`;

window.calcPay=function(id,rate){
  const hrs=parseFloat(document.getElementById('hrs-'+id).value)||0;
  const r=parseFloat(rate)||0;
  const gross=Math.min(hrs,40)*r+Math.max(0,hrs-40)*r*1.5;
  const el=document.getElementById('pay-'+id);
  el.textContent='$'+gross.toFixed(2);
  el.style.color=hrs>40?'var(--warning)':'var(--text)';
  let t=0;document.querySelectorAll('[id^="pay-"]').forEach(x=>{t+=parseFloat(x.textContent.replace('$',''))||0;});
  document.getElementById('total-pay').textContent='$'+t.toFixed(2);
};

async function loadExpenses(){

  `<div class="card" style="margin-bottom:16px"><div style="display:flex;justify-content:space-between"><span style="color:var(--text2)">${exps.length} expenses</span><span style="font-size:22px;font-weight:800;color:var(--danger)">-$${total.toFixed(2)}</span></div></div>`+

async function loadTimeOff(){
  const list=document.getElementById('to-list');if(!list)return;
  const snap=await getDocs(query(collection(db,'timeoff'),orderBy('createdAt','desc')));
  if(snap.empty){list.innerHTML='<div class="empty"><div class="empty-icon">📅</div><p>No pending requests</p></div>';return;}
  list.innerHTML=snap.docs.map(d=>{
    const r={id:d.id,...d.data()};
    const emp=employees.find(e=>e.id===r.empId);
    const name=emp?`${emp.first} ${emp.last}`:'Unknown';
    const twoWks=r.from&&(new Date(r.from+'T12:00:00')-new Date()>=1209600000);
    return`<div class="request-row">
      <div style="flex:1"><div style="font-weight:600;font-size:14px">${name}</div>
      <div style="font-size:12px;color:var(--text2);margin-top:3px">${fmtD(r.from)} → ${fmtD(r.to)}${r.reason?' · '+r.reason:''}</div>
      ${!twoWks?'<span class="badge badge-yellow" style="margin-top:4px">⚠️ Less than 2 weeks notice</span>':''}
      </div>
      <div style="display:flex;gap:8px">
        <button class="action-btn approve-btn" onclick="approveTO('${r.id}')">✓ Approve</button>
        <button class="action-btn deny-btn" onclick="denyTO('${r.id}')">✗</button>
      </div>
    </div>`;
  }).join('');
}
window.openTOModal=function(){
  const bSel=document.getElementById('to-biz');
  bSel.innerHTML=businesses.map(b=>`<option value="${b.id}">${b.name}</option>`).join('');
  updateTOEmps(businesses[0]?.id);
  openModal('modal-timeoff');
};
window.updateTOEmps=function(bizId){
  document.getElementById('to-emp').innerHTML=employees.filter(e=>e.bizId===bizId).map(e=>`<option value="${e.id}">${e.first} ${e.last}</option>`).join('');
};
window.saveTimeOff=async function(){
  const from=document.getElementById('to-from').value,to=document.getElementById('to-to').value;
  if(!from||!to){alert('Select dates');return;}
  await addDoc(collection(db,'timeoff'),{empId:document.getElementById('to-emp').value,from,to,reason:document.getElementById('to-reason').value,status:'pending',createdAt:serverTimestamp()});
  closeModal('modal-timeoff');loadTimeOff();
};
window.approveTO=async function(id){await updateDoc(doc(db,'timeoff',id),{status:'approved'});loadTimeOff();};
window.denyTO=function(id){confirm2('Deny Request','Remove this time off request?',async()=>{await deleteDoc(doc(db,'timeoff',id));loadTimeOff();});};

// ── CHAT ──
function rChat(){
  return`<div class="chat-container">
    <div style="padding:12px 16px;border-bottom:1px solid var(--border)">
      <select id="chat-room" onchange="switchRoom(this.value)" style="max-width:220px">
        <option value="general">📢 General</option>
        ${businesses.map(b=>`<option value="${b.id}">📦 ${b.name}</option>`).join('')}
      </select>
    </div>
    <div class="chat-messages" id="chat-msgs"><div class="loader">Loading...</div></div>
    <div class="chat-input-row">
      <input class="chat-input" id="chat-in" placeholder="Message..." onkeypress="if(event.key==='Enter')sendMsg()">
      <button class="send-btn" onclick="sendMsg()">↑</button>
    </div>
  </div>`;
}
let chatRoom='general';
function startChat(){chatRoom='general';listenChat();}
window.switchRoom=function(r){chatRoom=r;listenChat();};
function listenChat(){
  if(chatUnsub){chatUnsub();chatUnsub=null;}
  chatUnsub=onSnapshot(query(collection(db,'chat_'+chatRoom),orderBy('ts','asc')),snap=>{
    const el=document.getElementById('chat-msgs');if(!el)return;
    if(snap.empty){el.innerHTML='<div class="empty"><div class="empty-icon">💬</div><p>No messages yet</p></div>';return;}
    el.innerHTML=snap.docs.map(d=>{
      const m={id:d.id,...d.data()};const mine=m.uid===currentUser?.uid;
      const ts=m.ts?.toDate?new Date(m.ts.toDate()).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}):'';
      return`<div class="chat-bubble ${mine?'mine':'theirs'}">${!mine?`<div class="bubble-name">${m.name||'?'}</div>`:''}<div class="bubble-text">${m.text}</div><div class="bubble-time">${ts}</div></div>`;
    }).join('');
    el.scrollTop=el.scrollHeight;
  });
}
window.sendMsg=async function(){
  const inp=document.getElementById('chat-in');if(!inp||!inp.value.trim())return;
  const text=inp.value.trim();inp.value='';
  await addDoc(collection(db,'chat_'+chatRoom),{text,uid:currentUser.uid,name:currentUser.email.split('@')[0],ts:serverTimestamp()});
};

// ── MODALS ──
window.openBizModal=function(bizId){
  const editing=!!bizId;
  document.getElementById('modal-biz-title').textContent=editing?'Edit Business':'Add Business';
  document.getElementById('biz-edit-id').value=bizId||'';
  if(editing){
    const b=businesses.find(x=>x.id===bizId);if(!b)return;
    document.getElementById('biz-name').value=b.name||'';
    document.getElementById('biz-type').value=b.type||'llc';
    document.getElementById('biz-ein').value=b.ein||'';
    document.getElementById('biz-state').value=b.state||'';
    document.getElementById('biz-address').value=b.address||'';
    document.getElementById('biz-franchisor').value=b.franchisor||'';
    document.getElementById('biz-owner').value=b.owner||'';
    document.getElementById('biz-notes').value=b.notes||'';
  }else{
    ['biz-name','biz-ein','biz-state','biz-address','biz-franchisor','biz-owner','biz-notes'].forEach(id=>document.getElementById(id).value='');
  }
  openModal('modal-biz');
};

window.openEmpModal=function(prefillBizId){
  document.getElementById('emp-biz').innerHTML=businesses.map(b=>`<option value="${b.id}" ${b.id===prefillBizId?'selected':''}>${b.name}</option>`).join('');
  ['emp-first','emp-last','emp-role','emp-phone','emp-phone2','emp-email','emp-rate','emp-hire'].forEach(id=>document.getElementById(id).value='');
  openModal('modal-emp');
};

window.saveBusiness=async function(){
  const name=document.getElementById('biz-name').value.trim();if(!name){alert('Name required');return;}
  const data={name,type:document.getElementById('biz-type').value,ein:document.getElementById('biz-ein').value.trim(),state:document.getElementById('biz-state').value.trim(),address:document.getElementById('biz-address').value.trim(),franchisor:document.getElementById('biz-franchisor').value.trim(),owner:document.getElementById('biz-owner').value.trim(),notes:document.getElementById('biz-notes').value.trim()};
  const editId=document.getElementById('biz-edit-id').value;
  if(editId){
    await updateDoc(doc(db,'businesses',editId),data);
    const idx=businesses.findIndex(b=>b.id===editId);
    if(idx>-1)businesses[idx]={...businesses[idx],...data};
  }else{
    data.createdAt=serverTimestamp();
    const ref=await addDoc(collection(db,'businesses'),data);
    businesses.push({id:ref.id,...data});
  }
  closeModal('modal-biz');render();
};

window.saveEmployee=async function(){
  const first=document.getElementById('emp-first').value.trim(),last=document.getElementById('emp-last').value.trim();
  if(!first||!last){alert('Name required');return;}
  const emp={bizId:document.getElementById('emp-biz').value,first,last,role:document.getElementById('emp-role').value.trim(),phone:document.getElementById('emp-phone').value.trim(),phone2:document.getElementById('emp-phone2').value.trim(),email:document.getElementById('emp-email').value.trim(),rate:document.getElementById('emp-rate').value,hireDate:document.getElementById('emp-hire').value,status:document.getElementById('emp-status').value,createdAt:serverTimestamp()};
  const ref=await addDoc(collection(db,'employees'),emp);
  employees.push({id:ref.id,...emp});
  closeModal('modal-emp');render();
};

window.openModal=function(id){document.getElementById(id).classList.add('open');};
window.closeModal=function(id){document.getElementById(id).classList.remove('open');};

</script>
