<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prit BOS</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: #2a2a3a;
    --accent: #4f7cff;
    --accent2: #7c4fff;
    --success: #22c55e;
    --warning: #f59e0b;
    --danger: #ef4444;
    --text: #f0f0f5;
    --text2: #8888aa;
    --text3: #555570;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height:100vh; }

  /* AUTH */
  #auth-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; }
  .auth-card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:40px 32px; width:100%; max-width:380px; }
  .auth-logo { text-align:center; margin-bottom:32px; }
  .auth-logo .logo-mark { width:56px; height:56px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border-radius:16px; margin:0 auto 12px; display:flex; align-items:center; justify-content:center; font-size:24px; font-weight:800; }
  .auth-logo h1 { font-size:20px; font-weight:700; }
  .auth-logo p { color:var(--text2); font-size:13px; margin-top:4px; }
  .field { margin-bottom:16px; }
  .field label { display:block; font-size:12px; font-weight:600; color:var(--text2); margin-bottom:6px; letter-spacing:.05em; text-transform:uppercase; }
  .field input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:12px 14px; color:var(--text); font-size:15px; outline:none; transition:border-color .2s; }
  .field input:focus { border-color:var(--accent); }
  .btn { width:100%; padding:13px; border:none; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; transition:opacity .2s; }
  .btn-primary { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; }
  .btn:hover { opacity:.85; }
  .auth-error { color:var(--danger); font-size:13px; text-align:center; margin-top:12px; min-height:20px; }

  /* APP SHELL */
  #app { display:none; min-height:100vh; }
  .topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:0 20px; height:56px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .topbar-left { display:flex; align-items:center; gap:12px; }
  .topbar-logo { width:32px; height:32px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border-radius:9px; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:13px; }
  .topbar-title { font-weight:700; font-size:16px; }
  .topbar-right { display:flex; align-items:center; gap:8px; }
  .avatar { width:32px; height:32px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; cursor:pointer; }
  .icon-btn { background:none; border:none; color:var(--text2); cursor:pointer; padding:6px; border-radius:8px; font-size:18px; transition:color .2s; }
  .icon-btn:hover { color:var(--text); }

  /* NAV */
  .nav { background:var(--surface); border-bottom:1px solid var(--border); display:flex; overflow-x:auto; padding:0 16px; gap:4px; }
  .nav::-webkit-scrollbar { display:none; }
  .nav-item { padding:12px 16px; font-size:13px; font-weight:600; color:var(--text2); cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap; transition:all .2s; }
  .nav-item.active { color:var(--accent); border-bottom-color:var(--accent); }

  /* CONTENT */
  .content { padding:20px; max-width:900px; margin:0 auto; }

  /* CARDS */
  .card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:20px; margin-bottom:16px; }
  .card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .card-title { font-size:15px; font-weight:700; }
  .card-subtitle { font-size:12px; color:var(--text2); margin-top:2px; }

  /* BUSINESS CARDS */
  .biz-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  @media(max-width:500px){ .biz-grid { grid-template-columns:1fr; } }
  .biz-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:18px; cursor:pointer; transition:border-color .2s,transform .15s; }
  .biz-card:hover { border-color:var(--accent); transform:translateY(-1px); }
  .biz-icon { width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:22px; margin-bottom:12px; }
  .biz-name { font-size:14px; font-weight:700; margin-bottom:4px; }
  .biz-type { font-size:11px; color:var(--text2); }
  .biz-stats { display:flex; gap:12px; margin-top:12px; padding-top:12px; border-top:1px solid var(--border); }
  .biz-stat { text-align:center; }
  .biz-stat-val { font-size:18px; font-weight:800; color:var(--accent); }
  .biz-stat-label { font-size:10px; color:var(--text2); margin-top:2px; }
  .biz-add { border:2px dashed var(--border); background:transparent; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px; min-height:140px; color:var(--text3); }
  .biz-add:hover { border-color:var(--accent); color:var(--accent); }

  /* BADGES */
  .badge { display:inline-flex; align-items:center; padding:3px 8px; border-radius:20px; font-size:11px; font-weight:600; }
  .badge-green { background:#22c55e22; color:var(--success); }
  .badge-yellow { background:#f59e0b22; color:var(--warning); }
  .badge-gray { background:#ffffff11; color:var(--text2); }
  .badge-blue { background:#4f7cff22; color:var(--accent); }

  /* EMPLOYEES */
  .emp-list { display:flex; flex-direction:column; gap:10px; }
  .emp-row { background:var(--surface2); border-radius:12px; padding:14px 16px; display:flex; align-items:center; gap:14px; cursor:pointer; transition:background .2s; }
  .emp-row:hover { background:var(--border); }
  .emp-avatar { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; flex-shrink:0; }
  .emp-info { flex:1; }
  .emp-name { font-size:14px; font-weight:600; }
  .emp-role { font-size:12px; color:var(--text2); margin-top:2px; }
  .emp-phone { font-size:12px; color:var(--text2); }

  /* SCHEDULE */
  .week-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .week-label { font-size:15px; font-weight:700; }
  .week-btn { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:6px 14px; border-radius:8px; cursor:pointer; font-size:13px; }
  .schedule-grid { overflow-x:auto; }
  .schedule-table { width:100%; border-collapse:collapse; min-width:600px; }
  .schedule-table th { background:var(--surface2); padding:10px 8px; font-size:11px; font-weight:600; color:var(--text2); text-align:center; border:1px solid var(--border); }
  .schedule-table td { border:1px solid var(--border); padding:6px; text-align:center; vertical-align:middle; min-width:80px; }
  .schedule-table td:first-child { text-align:left; padding:8px 12px; font-size:13px; font-weight:600; background:var(--surface2); min-width:100px; }
  .shift-cell { background:var(--surface2); border-radius:6px; padding:4px 6px; font-size:11px; cursor:pointer; transition:background .15s; }
  .shift-cell:hover { background:var(--border); }
  .shift-time { font-weight:600; color:var(--accent); }
  .shift-empty { color:var(--text3); font-size:18px; cursor:pointer; }
  .shift-empty:hover { color:var(--accent); }

  /* PAYROLL */
  .payroll-summary { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:20px; }
  @media(max-width:500px){ .payroll-summary { grid-template-columns:1fr 1fr; } }
  .pay-stat { background:var(--surface2); border-radius:12px; padding:14px; }
  .pay-stat-label { font-size:11px; color:var(--text2); margin-bottom:6px; }
  .pay-stat-val { font-size:22px; font-weight:800; }
  .pay-stat-val.green { color:var(--success); }
  .pay-stat-val.blue { color:var(--accent); }

  /* MODALS */
  .modal-overlay { position:fixed; inset:0; background:#00000088; z-index:200; display:none; align-items:flex-end; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--surface); border-radius:20px 20px 0 0; width:100%; max-width:500px; padding:28px 24px; max-height:90vh; overflow-y:auto; }
  .modal-title { font-size:17px; font-weight:700; margin-bottom:20px; }
  .modal-actions { display:flex; gap:10px; margin-top:20px; }
  .btn-sm { padding:10px 20px; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; border:none; }
  .btn-outline { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
  .btn-danger { background:var(--danger); color:#fff; }
  .btn-success { background:var(--success); color:#fff; }

  /* FORMS */
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  @media(max-width:400px){ .form-row { grid-template-columns:1fr; } }
  select { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:12px 14px; color:var(--text); font-size:15px; outline:none; }
  select:focus { border-color:var(--accent); }

  /* SECTION HEADERS */
  .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .section-title { font-size:18px; font-weight:800; }
  .add-btn { background:var(--accent); color:#fff; border:none; border-radius:10px; padding:8px 16px; font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:6px; }
  .add-btn:hover { opacity:.85; }

  /* COLORS */
  .c1{background:#4f7cff33;color:#4f7cff}
  .c2{background:#7c4fff33;color:#7c4fff}
  .c3{background:#22c55e33;color:#22c55e}
  .c4{background:#f59e0b33;color:#f59e0b}
  .c5{background:#ef444433;color:#ef4444}
  .c6{background:#06b6d433;color:#06b6d4}

  /* EMPTY STATE */
  .empty { text-align:center; padding:40px 20px; color:var(--text3); }
  .empty-icon { font-size:40px; margin-bottom:12px; }
  .empty p { font-size:14px; }

  /* LOADER */
  .loader { text-align:center; padding:40px; color:var(--text2); }

  /* DETAIL VIEW */
  .detail-header { display:flex; align-items:center; gap:14px; margin-bottom:20px; }
  .back-btn { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:8px 14px; border-radius:10px; cursor:pointer; font-size:13px; }
  .detail-avatar { width:56px; height:56px; border-radius:16px; display:flex; align-items:center; justify-content:center; font-size:24px; font-weight:800; }
  .detail-name { font-size:20px; font-weight:800; }
  .detail-sub { font-size:13px; color:var(--text2); margin-top:2px; }
  .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .info-item label { font-size:11px; color:var(--text2); font-weight:600; text-transform:uppercase; letter-spacing:.05em; }
  .info-item p { font-size:14px; font-weight:600; margin-top:4px; }

  /* TIME OFF */
  .request-list { display:flex; flex-direction:column; gap:10px; }
  .request-row { background:var(--surface2); border-radius:12px; padding:14px 16px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .request-info { flex:1; }
  .request-name { font-size:14px; font-weight:600; }
  .request-dates { font-size:12px; color:var(--text2); margin-top:3px; }
  .request-actions { display:flex; gap:8px; }
  .action-btn { padding:6px 12px; border-radius:8px; font-size:12px; font-weight:600; border:none; cursor:pointer; }
  .approve-btn { background:#22c55e22; color:var(--success); }
  .deny-btn { background:#ef444422; color:var(--danger); }

  /* CHAT */
  .chat-container { display:flex; flex-direction:column; height:calc(100vh - 160px); }
  .chat-messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; }
  .chat-bubble { max-width:75%; }
  .chat-bubble.mine { align-self:flex-end; }
  .chat-bubble.theirs { align-self:flex-start; }
  .bubble-name { font-size:11px; color:var(--text2); margin-bottom:4px; }
  .bubble-text { padding:10px 14px; border-radius:16px; font-size:14px; line-height:1.4; }
  .mine .bubble-text { background:var(--accent); color:#fff; border-radius:16px 16px 4px 16px; }
  .theirs .bubble-text { background:var(--surface2); border-radius:16px 16px 16px 4px; }
  .bubble-time { font-size:10px; color:var(--text3); margin-top:4px; text-align:right; }
  .chat-input-row { padding:12px 16px; border-top:1px solid var(--border); display:flex; gap:10px; background:var(--surface); }
  .chat-input { flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:10px 16px; color:var(--text); font-size:14px; outline:none; }
  .send-btn { background:var(--accent); color:#fff; border:none; border-radius:50%; width:40px; height:40px; font-size:18px; cursor:pointer; flex-shrink:0; }

  .divider { height:1px; background:var(--border); margin:16px 0; }
  .tag { display:inline-block; padding:2px 8px; border-radius:6px; font-size:11px; font-weight:600; background:var(--surface2); color:var(--text2); margin:2px; }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-mark">P</div>
      <h1>Prit BOS</h1>
      <p>Business Operating System</p>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="auth-email" placeholder="you@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="auth-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" onclick="signIn()">Sign In</button>
    <p class="auth-error" id="auth-error"></p>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">P</div>
      <span class="topbar-title">Prit BOS</span>
    </div>
    <div class="topbar-right">
      <div class="avatar" id="user-avatar">P</div>
      <button class="icon-btn" onclick="signOut()" title="Sign Out">⏻</button>
    </div>
  </div>

  <div class="nav" id="main-nav">
    <div class="nav-item active" onclick="showTab('dashboard')">Dashboard</div>
    <div class="nav-item" onclick="showTab('employees')">Employees</div>
    <div class="nav-item" onclick="showTab('schedule')">Schedule</div>
    <div class="nav-item" onclick="showTab('payroll')">Payroll</div>
    <div class="nav-item" onclick="showTab('timeoff')">Time Off</div>
    <div class="nav-item" onclick="showTab('chat')">Team Chat</div>
    <div class="nav-item" onclick="showTab('businesses')">Businesses</div>
  </div>

  <div class="content" id="main-content">
    <div class="loader">Loading...</div>
  </div>
</div>

<!-- ADD BUSINESS MODAL -->
<div class="modal-overlay" id="modal-biz">
  <div class="modal">
    <div class="modal-title">Add Business</div>
    <div class="field"><label>Business Name</label><input type="text" id="biz-name" placeholder="e.g. The UPS Store #8181"></div>
    <div class="field"><label>Type</label>
      <select id="biz-type">
        <option value="franchise">Franchise</option>
        <option value="llc">LLC</option>
        <option value="s-corp">S-Corp</option>
        <option value="sole-prop">Sole Proprietorship</option>
        <option value="rental">Rental Property</option>
        <option value="restaurant">Restaurant / Food</option>
        <option value="real-estate">Real Estate</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div class="form-row">
      <div class="field"><label>EIN</label><input type="text" id="biz-ein" placeholder="XX-XXXXXXX"></div>
      <div class="field"><label>State</label><input type="text" id="biz-state" placeholder="TN"></div>
    </div>
    <div class="field"><label>Address</label><input type="text" id="biz-address" placeholder="Full address"></div>
    <div class="field"><label>Franchisor / Parent Company</label><input type="text" id="biz-franchisor" placeholder="If applicable"></div>
    <div class="field"><label>Owner / Operator</label><input type="text" id="biz-owner" placeholder="e.g. Prit, Father"></div>
    <div class="field"><label>Notes</label><input type="text" id="biz-notes" placeholder="Anything else relevant"></div>
    <div class="modal-actions">
      <button class="btn-sm btn-outline" style="flex:1" onclick="closeModal('modal-biz')">Cancel</button>
      <button class="btn-sm btn-primary btn" style="flex:2;width:auto;padding:10px 20px" onclick="saveBusiness()">Save Business</button>
    </div>
  </div>
</div>

<!-- ADD EMPLOYEE MODAL -->
<div class="modal-overlay" id="modal-emp">
  <div class="modal">
    <div class="modal-title">Add Employee</div>
    <div class="field"><label>Business</label>
      <select id="emp-biz"></select>
    </div>
    <div class="form-row">
      <div class="field"><label>First Name</label><input type="text" id="emp-first" placeholder="First"></div>
      <div class="field"><label>Last Name</label><input type="text" id="emp-last" placeholder="Last"></div>
    </div>
    <div class="field"><label>Role / Title</label><input type="text" id="emp-role" placeholder="e.g. Store Associate"></div>
    <div class="form-row">
      <div class="field"><label>Primary Phone</label><input type="tel" id="emp-phone" placeholder="615-000-0000"></div>
      <div class="field"><label>Secondary Phone</label><input type="tel" id="emp-phone2" placeholder="Optional"></div>
    </div>
    <div class="form-row">
      <div class="field"><label>Email</label><input type="email" id="emp-email" placeholder="Optional"></div>
      <div class="field"><label>Hourly Rate ($)</label><input type="number" id="emp-rate" placeholder="0.00" step="0.25"></div>
    </div>
    <div class="form-row">
      <div class="field"><label>Hire Date</label><input type="date" id="emp-hire"></div>
      <div class="field"><label>Status</label>
        <select id="emp-status">
          <option value="active">Active</option>
          <option value="part-time">Part-Time</option>
          <option value="inactive">Inactive</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-sm btn-outline" style="flex:1" onclick="closeModal('modal-emp')">Cancel</button>
      <button class="btn-sm btn-primary btn" style="flex:2;width:auto;padding:10px 20px" onclick="saveEmployee()">Save Employee</button>
    </div>
  </div>
</div>

<!-- SHIFT MODAL -->
<div class="modal-overlay" id="modal-shift">
  <div class="modal">
    <div class="modal-title" id="shift-modal-title">Set Shift</div>
    <div class="form-row">
      <div class="field"><label>Start Time</label><input type="time" id="shift-start" value="09:00"></div>
      <div class="field"><label>End Time</label><input type="time" id="shift-end" value="17:00"></div>
    </div>
    <div class="field"><label>Notes</label><input type="text" id="shift-notes" placeholder="Optional"></div>
    <div class="modal-actions">
      <button class="btn-sm btn-outline" style="flex:1" onclick="closeModal('modal-shift')">Cancel</button>
      <button class="btn-sm btn-danger action-btn" style="flex:1" onclick="clearShift()">Clear</button>
      <button class="btn-sm btn-primary btn" style="flex:2;width:auto;padding:10px 20px" onclick="saveShift()">Save Shift</button>
    </div>
  </div>
</div>

<!-- TIME OFF MODAL -->
<div class="modal-overlay" id="modal-timeoff">
  <div class="modal">
    <div class="modal-title">Request Time Off</div>
    <div class="field"><label>Business</label><select id="to-biz"></select></div>
    <div class="field"><label>Employee</label><select id="to-emp"><option>Select business first</option></select></div>
    <div class="form-row">
      <div class="field"><label>From</label><input type="date" id="to-from"></div>
      <div class="field"><label>To</label><input type="date" id="to-to"></div>
    </div>
    <div class="field"><label>Reason</label><input type="text" id="to-reason" placeholder="Personal, vacation, medical..."></div>
    <p style="font-size:12px;color:var(--text2);margin-top:-8px">⚠️ 2-week advance notice required</p>
    <div class="modal-actions">
      <button class="btn-sm btn-outline" style="flex:1" onclick="closeModal('modal-timeoff')">Cancel</button>
      <button class="btn-sm btn-primary btn" style="flex:2;width:auto;padding:10px 20px" onclick="saveTimeOff()">Submit Request</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut as fbSignOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, addDoc, setDoc, getDoc, getDocs, updateDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD1rNduHdthc_J7juITnQIZycrbmRIRLMw",
  authDomain: "prit-business-op.firebaseapp.com",
  projectId: "prit-business-op",
  storageBucket: "prit-business-op.firebasestorage.app",
  messagingSenderId: "440241703218",
  appId: "1:440241703218:web:a0283548f8769cfb83af2b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// STATE
let currentUser = null;
let businesses = [];
let employees = [];
let currentBizFilter = 'all';
let currentWeekOffset = 0;
let shiftEditContext = null;
let chatUnsub = null;

// COLORS
const colors = ['c1','c2','c3','c4','c5','c6'];
function getColor(i){ return colors[i % colors.length]; }
function initials(name){ return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }

// FORMAT
function fmt12(t){ if(!t)return''; let [h,m]=t.split(':'); h=parseInt(h); let ampm=h>=12?'PM':'AM'; h=h%12||12; return `${h}:${m}${ampm}`; }
function fmtDate(d){ if(!d)return''; return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function getWeekDates(offset=0){
  const now=new Date(); const day=now.getDay(); const monday=new Date(now);
  monday.setDate(now.getDate()-day+1+(offset*7));
  return Array.from({length:7},(_,i)=>{ const d=new Date(monday); d.setDate(monday.getDate()+i); return d; });
}
const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

// AUTH

  const email=document.getElementById('auth-email').value;

  err.textContent='';

};
window.signOut = async function(){
  if(chatUnsub) chatUnsub();
  await fbSignOut(auth);
};

onAuthStateChanged(auth, async user=>{
  if(user){
    currentUser=user;
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('app').style.display='block';
    await loadData();
    showTab('dashboard');
  } else {

});

// DATA
async function loadData(){
  const bizSnap = await getDocs(collection(db,'businesses'));
  businesses = bizSnap.docs.map(d=>({id:d.id,...d.data()}));
  const empSnap = await getDocs(collection(db,'employees'));
  employees = empSnap.docs.map(d=>({id:d.id,...d.data()}));
}

// NAV
let currentTab = 'dashboard';
window.showTab = function(tab){
  currentTab=tab;
  document.querySelectorAll('.nav-item').forEach((el,i)=>{
    const tabs=['dashboard','employees','schedule','payroll','timeoff','chat','businesses'];
    el.classList.toggle('active', tabs[i]===tab);
  });
  if(tab==='chat') startChat(); else { if(chatUnsub){chatUnsub();chatUnsub=null;} }
  render();
};

function render(){
  const c=document.getElementById('main-content');
  if(currentTab==='dashboard') c.innerHTML=renderDashboard();
  else if(currentTab==='businesses') c.innerHTML=renderBusinesses();
  else if(currentTab==='employees') c.innerHTML=renderEmployees();
  else if(currentTab==='schedule') c.innerHTML=renderSchedule();
  else if(currentTab==='payroll') c.innerHTML=renderPayroll();
  else if(currentTab==='timeoff') c.innerHTML=renderTimeOff();
  else if(currentTab==='chat') c.innerHTML=renderChat();
}

// SCHEDULE
function renderSchedule(){
  const dates=getWeekDates(currentWeekOffset);
  const weekLabel=`Week of ${dates[0].toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${dates[6].toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`;
  const bizOptions=businesses.map(b=>`<option value="${b.id}">${b.name}</option>`).join('');
  const schedBiz=currentBizFilter==='all'&&businesses.length>0?businesses[0].id:currentBizFilter;
  const schedEmps=employees.filter(e=>e.bizId===schedBiz&&e.status!=='inactive');
  return `
  <div class="section-header"><div class="section-title">Schedule</div></div>
  <div style="margin-bottom:14px"><select onchange="filterByBiz(this.value)" style="max-width:280px">${businesses.map(b=>`<option value="${b.id}" ${b.id===schedBiz?'selected':''}>${b.name}</option>`).join('')}</select></div>
  <div class="week-nav">
    <button class="week-btn" onclick="changeWeek(-1)">← Prev</button>
    <span class="week-label">${weekLabel}</span>
    <button class="week-btn" onclick="changeWeek(1)">Next →</button>
  </div>
  <div class="schedule-grid">
  <table class="schedule-table">
    <thead><tr><th>Employee</th>${DAYS.map((d,i)=>`<th>${d}<br><span style="font-weight:400;color:var(--text3)">${dates[i].getDate()}</span></th>`).join('')}</tr></thead>
    <tbody>${schedEmps.length===0?`<tr><td colspan="8" style="text-align:center;color:var(--text2);padding:24px">No active employees for this business</td></tr>`:
    schedEmps.map(e=>{
      return `<tr>
        <td>${e.first} ${e.last}</td>
        ${dates.map((d,di)=>{
          const key=`${e.id}_${d.toISOString().split('T')[0]}`;
          const shift=window._shifts&&window._shifts[key];
          return `<td onclick="editShift('${e.id}','${e.first} ${e.last}','${d.toISOString().split('T')[0]}')">${shift?`<div class="shift-cell"><div class="shift-time">${fmt12(shift.start)}</div><div style="font-size:10px;color:var(--text2)">${fmt12(shift.end)}</div></div>`:`<div class="shift-empty">+</div>`}</td>`;
        }).join('')}
      </tr>`;
    }).join('')}
    </tbody>
  </table>
  </div>`;
}

window._shifts = {};
window.changeWeek = function(dir){ currentWeekOffset+=dir; render(); };
window.editShift = function(empId, empName, date){
  shiftEditContext={empId,empName,date};
  const key=`${empId}_${date}`;
  const existing=window._shifts[key];
  document.getElementById('shift-modal-title').textContent=`${empName} — ${fmtDate(date)}`;
  document.getElementById('shift-start').value=existing?existing.start:'09:00';
  document.getElementById('shift-end').value=existing?existing.end:'17:00';
  document.getElementById('shift-notes').value=existing?existing.notes||'':'';
  openModal('modal-shift');
};
window.saveShift = async function(){
  if(!shiftEditContext) return;
  const {empId,date}=shiftEditContext;
  const key=`${empId}_${date}`;
  const shift={start:document.getElementById('shift-start').value,end:document.getElementById('shift-end').value,notes:document.getElementById('shift-notes').value};
  window._shifts[key]=shift;
  await setDoc(doc(db,'shifts',key),{empId,date,...shift});
  closeModal('modal-shift'); render();
};
window.clearShift = async function(){
  if(!shiftEditContext) return;
  const key=`${shiftEditContext.empId}_${shiftEditContext.date}`;
  delete window._shifts[key];
  await deleteDoc(doc(db,'shifts',key));
  closeModal('modal-shift'); render();
};

window.updatePayroll = function(el, empId, rate){
  const hrs=parseFloat(el.value)||0;
  const r=parseFloat(rate)||0;
  const reg=Math.min(hrs,40)*r;
  const ot=Math.max(0,hrs-40)*r*1.5;
  const gross=reg+ot;
  document.getElementById('pay-'+empId).textContent='$'+gross.toFixed(2);
  if(hrs>40) document.getElementById('pay-'+empId).style.color='var(--warning)';
  let total=0;
  document.querySelectorAll('[id^="pay-"]').forEach(el=>{ total+=parseFloat(el.textContent.replace('$',''))||0; });
  document.getElementById('total-pay').textContent='$'+total.toFixed(2);
};

// TIME OFF
function renderTimeOff(){
  return `
  <div class="section-header"><div class="section-title">Time Off</div><button class="add-btn" onclick="openTimeOff()">+ Request</button></div>
  <div class="card">
    <div class="card-title" style="margin-bottom:4px">Policy</div>
    <p style="font-size:13px;color:var(--text2)">⚠️ 2-week advance notice required for all requests. Requests submitted less than 14 days in advance will be automatically flagged.</p>
  </div>
  <div class="section-header" style="margin-top:4px"><div style="font-weight:700;font-size:15px">Pending Requests</div></div>
  <div class="request-list" id="timeoff-list"><div class="loader">Loading...</div></div>`;
}

async function loadTimeOff(){
  const snap=await getDocs(query(collection(db,'timeoff'),orderBy('createdAt','desc')));
  const list=document.getElementById('timeoff-list');
  if(!list) return;
  if(snap.empty){ list.innerHTML='<div class="empty"><div class="empty-icon">📅</div><p>No pending requests</p></div>'; return; }
  list.innerHTML=snap.docs.map(d=>{
    const r={id:d.id,...d.data()};
    const emp=employees.find(e=>e.id===r.empId);
    const name=emp?`${emp.first} ${emp.last}`:r.empName||'Unknown';
    const twoWeeks=new Date(r.from+'T12:00:00')-new Date()>=1209600000;
    return `<div class="request-row">
      <div class="request-info">
        <div class="request-name">${name}</div>
        <div class="request-dates">${fmtDate(r.from)} → ${fmtDate(r.to)} · ${r.reason||''}</div>
        ${!twoWeeks?'<span class="badge badge-yellow" style="margin-top:4px">⚠️ Less than 2 weeks notice</span>':''}
      </div>
      <div class="request-actions">
        <button class="action-btn approve-btn" onclick="approveTO('${r.id}')">✓</button>
        <button class="action-btn deny-btn" onclick="denyTO('${r.id}')">✗</button>
      </div>
    </div>`;
  }).join('');
}

window.approveTO = async function(id){
  await updateDoc(doc(db,'timeoff',id),{status:'approved'});
  loadTimeOff();
};
window.denyTO = async function(id){
  await deleteDoc(doc(db,'timeoff',id));
  loadTimeOff();
};

window.openTimeOff = function(){
  const bSel=document.getElementById('to-biz');
  bSel.innerHTML=businesses.map(b=>`<option value="${b.id}">${b.name}</option>`).join('');
  bSel.onchange=function(){ updateTOEmps(this.value); };
  updateTOEmps(businesses[0]?.id);
  openModal('modal-timeoff');
};

function updateTOEmps(bizId){
  const sel=document.getElementById('to-emp');
  const emps=employees.filter(e=>e.bizId===bizId);
  sel.innerHTML=emps.map(e=>`<option value="${e.id}">${e.first} ${e.last}</option>`).join('');
}

window.saveTimeOff = async function(){
  const from=document.getElementById('to-from').value;
  const to=document.getElementById('to-to').value;
  const empId=document.getElementById('to-emp').value;
  const reason=document.getElementById('to-reason').value;
  if(!from||!to||!empId){ alert('Fill all fields'); return; }
  await addDoc(collection(db,'timeoff'),{empId,from,to,reason,status:'pending',createdAt:serverTimestamp()});
  closeModal('modal-timeoff');
  if(currentTab==='timeoff') loadTimeOff();
};

    <div style="padding:12px 16px;border-bottom:1px solid var(--border)">
      <select id="chat-room-sel" onchange="switchChatRoom(this.value)" style="max-width:220px">
        <option value="general">📢 General</option>
        ${businesses.map(b=>`<option value="${b.id}">📦 ${b.name}</option>`).join('')}
      </select>
    </div>
    <div class="chat-messages" id="chat-messages"><div class="loader">Loading messages...</div></div>
    <div class="chat-input-row">
      <input class="chat-input" id="chat-input" placeholder="Message..." onkeypress="if(event.key==='Enter')sendMsg()">
      <button class="send-btn" onclick="sendMsg()">↑</button>
    </div>
  </div>`;
}

let currentRoom='general';
function startChat(){ currentRoom='general'; listenChat(); }
window.switchChatRoom = function(room){ currentRoom=room; listenChat(); };
function listenChat(){
  if(chatUnsub){ chatUnsub(); chatUnsub=null; }
  const msgs=document.getElementById('chat-messages');
  if(!msgs) return;
  chatUnsub=onSnapshot(query(collection(db,'chat_'+currentRoom),orderBy('ts','asc')), snap=>{
    const msgs=document.getElementById('chat-messages');
    if(!msgs) return;
    if(snap.empty){ msgs.innerHTML='<div class="empty"><div class="empty-icon">💬</div><p>No messages yet. Say hi!</p></div>'; return; }
    msgs.innerHTML=snap.docs.map(d=>{
      const m={id:d.id,...d.data()};
      const mine=m.uid===currentUser?.uid;
      const ts=m.ts?.toDate?new Date(m.ts.toDate()).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}):'';
      return `<div class="chat-bubble ${mine?'mine':'theirs'}">
        ${!mine?`<div class="bubble-name">${m.name||'Unknown'}</div>`:''}
        <div class="bubble-text">${m.text}</div>
        <div class="bubble-time">${ts}</div>
      </div>`;
    }).join('');
    msgs.scrollTop=msgs.scrollHeight;
  });
}
window.sendMsg = async function(){
  const inp=document.getElementById('chat-input');
  if(!inp||!inp.value.trim()) return;
  const text=inp.value.trim(); inp.value='';
  await addDoc(collection(db,'chat_'+currentRoom),{text,uid:currentUser.uid,name:currentUser.email.split('@')[0],ts:serverTimestamp()});
};

// MODALS
window.openModal = function(id){
  if(id==='modal-emp'){
    const sel=document.getElementById('emp-biz');
    sel.innerHTML=businesses.map(b=>`<option value="${b.id}">${b.name}</option>`).join('');
  }
  document.getElementById(id).classList.add('open');
};
window.closeModal = function(id){ document.getElementById(id).classList.remove('open'); };

// SAVE BUSINESS
window.saveBusiness = async function(){
  const name=document.getElementById('biz-name').value.trim();
  if(!name){ alert('Business name required'); return; }
  const biz={
    name,type:document.getElementById('biz-type').value,
    ein:document.getElementById('biz-ein').value.trim(),
    state:document.getElementById('biz-state').value.trim(),
    address:document.getElementById('biz-address').value.trim(),
    franchisor:document.getElementById('biz-franchisor').value.trim(),
    owner:document.getElementById('biz-owner').value.trim(),
    notes:document.getElementById('biz-notes').value.trim(),
    createdAt:serverTimestamp()
  };
  const ref=await addDoc(collection(db,'businesses'),biz);
  businesses.push({id:ref.id,...biz});
  closeModal('modal-biz');
  ['biz-name','biz-ein','biz-state','biz-address','biz-franchisor','biz-owner','biz-notes'].forEach(id=>document.getElementById(id).value='');
  render();
};

// SAVE EMPLOYEE
window.saveEmployee = async function(){
  const first=document.getElementById('emp-first').value.trim();
  const last=document.getElementById('emp-last').value.trim();
  if(!first||!last){ alert('Name required'); return; }
  const emp={
    bizId:document.getElementById('emp-biz').value,
    first,last,
    role:document.getElementById('emp-role').value.trim(),
    phone:document.getElementById('emp-phone').value.trim(),
    phone2:document.getElementById('emp-phone2').value.trim(),
    email:document.getElementById('emp-email').value.trim(),
    rate:document.getElementById('emp-rate').value,
    hireDate:document.getElementById('emp-hire').value,
    status:document.getElementById('emp-status').value,
    createdAt:serverTimestamp()
  };
  const ref=await addDoc(collection(db,'employees'),emp);
  employees.push({id:ref.id,...emp});
  closeModal('modal-emp');
  ['emp-first','emp-last','emp-role','emp-phone','emp-phone2','emp-email','emp-rate','emp-hire'].forEach(id=>document.getElementById(id).value='');
  render();
};

async function loadShifts(){
  const snap=await getDocs(collection(db,'shifts'));
  window._shifts={};
  snap.docs.forEach(d=>{ window._shifts[d.id]={...d.data()}; });
}

// INIT
